{% extends './base.html' %}

{% block title %}Criar Conta{% endblock %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 4rem auto;">
    <h1 style="text-align: center; margin-bottom: 1.5rem;">Criar Conta</h1>

    {% if erros %}
      <div class="error-msg">
        <ul style="margin: 0; padding-left: 1.2rem;">
          {% for erro in erros %}
            <li>{{ erro }}</li>
          {% endfor %}
        </ul>
      </div>
    {% endif %}

    <form method="post" action="{% url 'register' %}">
      {% csrf_token %}
      <p>
          <label>Nome completo:</label>
          <input type="text" name="name" required placeholder="Seu nome" value="{{ name }}">
      </p>
      <p>
          <label>Login:</label>
          <input type="text" name="login" required placeholder="Escolha um usuário" value="{{ login }}">
      </p>
      <p>
          <label>E-mail:</label>
          <input type="email" name="email" required placeholder="seu@email.com" value="{{ email }}">
      </p>
      <p>
          <label>Senha:</label>
          <input type="password" name="senha" required placeholder="Mínimo 6 caracteres">
      </p>
      <p>
          <label>Confirmar senha:</label>
          <input type="password" name="senha_confirm" required placeholder="Repita a senha">
      </p>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Cadastrar</button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
        Já tem conta? <a href="{% url 'login' %}">Faça login</a>
    </p>
</div>
{% endblock %}
