{% extends './base.html' %}

{% block title %}Acesso ao Sistema{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <h1 style="text-align: center; margin-bottom: 1.5rem;">Acesso ao Sistema</h1>

    {% if erro %}
      <div class="error-msg">{{ erro }}</div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <p>
          <label>Login:</label>
          <input type="text" name="login" required placeholder="Digite seu usuário">
      </p>
      <p>
          <label>Senha:</label>
          <input type="password" name="senha" required placeholder="Digite sua senha">
      </p>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Entrar</button>
    </form>
</div>
{% endblock %}
